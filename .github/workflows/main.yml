name: MLflow CI Pipeline

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-model:

    runs-on: ubuntu-latest

    steps:

      # ==========================================
      # Checkout Source Code
      # ==========================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==========================================
      # Setup Python
      # ==========================================
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ==========================================
      # Check Environment
      # ==========================================
      - name: Check Environment
        run: |
          pwd
          python --version
          python -m pip --version
          ls -R

      # ==========================================
      # Install Dependencies
      # ==========================================
      - name: Install Dependencies
        working-directory: MLProject-CI
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install mlflow

      # ==========================================
      # Verify Project Structure
      # ==========================================
      - name: Verify MLProject
        working-directory: MLProject-CI
        run: |
          pwd
          ls -lah
          cat MLProject

      # ==========================================
      # Set MLflow Tracking URI
      # ==========================================
      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=file:$(pwd)/MLProject-CI/mlruns" >> $GITHUB_ENV

      # ==========================================
      # Run MLflow Project
      # ==========================================
      - name: Run MLflow Project
        working-directory: MLProject-CI
        run: |
          python -m mlflow run . -e main --env-manager local

      # ==========================================
      # Upload Artifact ke GitHub Actions
      # ==========================================
      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: diabetes-model-artifacts
          path: |
            MLProject-CI/artifacts/**
            MLProject-CI/mlruns/**

      # ==========================================
      # Commit Artifact ke Repository
      # ==========================================
      - name: Commit Artifacts
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add MLProject-CI/artifacts || true
          git add MLProject-CI/mlruns || true

          git diff --cached --quiet || git commit -m "Auto update MLflow artifacts"

          git push || true